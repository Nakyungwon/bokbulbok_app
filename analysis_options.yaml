# Harness Engineering: Strict lint rules to prevent common mistakes
# Run `flutter analyze` before every commit

include: package:flutter_lints/flutter.yaml

analyzer:
  errors:
    # Treat these as errors (will fail CI)
    missing_return: error
    dead_code: error
    unused_import: error
    unused_local_variable: warning
  exclude:
    - "**/*.g.dart"
    - "**/*.freezed.dart"

linter:
  rules:
    # === Prevent Common Mistakes ===
    avoid_print: true                    # Use debugPrint or logger
    avoid_empty_else: true
    avoid_relative_lib_imports: true     # Enforce package imports
    avoid_returning_null_for_future: true
    avoid_slow_async_io: true
    avoid_type_to_string: true
    avoid_types_as_parameter_names: true
    avoid_web_libraries_in_flutter: true
    cancel_subscriptions: true           # Prevent memory leaks
    close_sinks: true                    # Prevent memory leaks
    no_duplicate_case_values: true
    no_logic_in_create_state: true       # Flutter best practice
    throw_in_finally: true
    unnecessary_statements: true
    use_key_in_widget_constructors: true # Flutter performance

    # === Code Style Consistency ===
    prefer_const_constructors: true
    prefer_const_declarations: true
    prefer_final_fields: true
    prefer_final_locals: true
    prefer_single_quotes: true
    sort_child_properties_last: true     # Widget readability

    # === Architecture Enforcement ===
    depend_on_referenced_packages: true
    prefer_relative_imports: false       # Use package imports

    # === Safety ===
    always_declare_return_types: true
    always_require_non_null_named_parameters: true
    avoid_dynamic_calls: true
    prefer_null_aware_method_calls: true
